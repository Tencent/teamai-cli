# TeamAI MR Knowledge Extract — GitHub Actions
#
# 在 PR 创建/更新时自动提炼知识建议并以 comment 贴到 PR 上；
# PR 合入后自动将 learning 和 codebase 建议写入团队知识仓库。
#
# 使用前请配置：
#   1. Repository Secret: TEAMAI_SYNC_TOKEN（对团队知识仓库有写权限的 PAT）
#   2. 修改 write job 中的 <owner>/<team-knowledge-repo> 为你的团队仓库路径
#   3. 如有 AI API key 需求，配置对应环境变量（参见 teamai CLI 文档）

name: TeamAI MR Knowledge Extract

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_target:
    types: [closed]

jobs:
  # ── PR 创建/更新时：提炼知识并以 comment 形式展示 ──────────
  comment:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install teamai-cli
        run: npm install -g teamai-cli

      - name: Extract and Comment
        run: |
          teamai ci extract-mr \
            --url "${{ github.event.pull_request.html_url }}" \
            --mode comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── PR 合入后：将知识写入团队仓库 ─────────────────────────
  write:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: <owner>/<team-knowledge-repo>
          token: ${{ secrets.TEAMAI_SYNC_TOKEN }}
          path: team-repo

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install teamai-cli
        run: npm install -g teamai-cli

      - name: Write Knowledge to Repo
        run: |
          teamai ci extract-mr \
            --url "${{ github.event.pull_request.html_url }}" \
            --mode write \
            --team-repo ./team-repo \
            --write-mode direct
        env:
          GITHUB_TOKEN: ${{ secrets.TEAMAI_SYNC_TOKEN }}

      - name: Commit and Push
        run: |
          cd team-repo
          git config user.name "teamai-ci"
          git config user.email "teamai-ci@users.noreply.github.com"
          git add learnings/ docs/ .teamai/
          git diff --cached --quiet || \
            git commit -m "[teamai] Extract knowledge from PR #${{ github.event.pull_request.number }}"
          git push
